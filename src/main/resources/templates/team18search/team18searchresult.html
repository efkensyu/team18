<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.ofg">
<head>
<meta charset="UTF-8">
<title>検索結果</title>
<link rel="stylesheet" type="text/css" href="team18/Team18search.css">
</head>
<body>
	<div class="book-card"
	     th:each="book : ${searchList}">

	    <img class="book-image"
	         th:src="@{/team18/{file}(file=${book.cover})}"
	         alt="本の表紙">

	    <div class="book-info">

	        <h2 th:text="${book.bookNm}"></h2>

	        <p th:text="'作者：' + ${book.author}"></p>

	        <p th:text="'発行日：' + ${book.publishDay}"></p>

	        <p th:text="'在庫：' + ${book.stock}"></p>

	        <form th:action="@{/team18rental}"
	              method="post">

	            <input type="hidden"
	                   name="bookId"
	                   th:value="${book.bookId}">

	            <button type="submit">
	                レンタル
	            </button>

	        </form>

	        <a th:href="@{/team18search}">
	            戻る
	        </a></div></div>
</body>
</html>
