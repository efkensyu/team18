<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
    <title>検索</title>
	<link rel="stylesheet" type="text/css" href="team18/Team18search.css">
</head>
<body>

<h1>本検索</h1>

<form th:action="@{/team18search}" th:method="post">
    <input type="text" name="keyword">
    <button type="submit">検索</button>
</form>
<br>
<th:block class="scrollbox">
	<form th:action="@{/team18rental}" method="post">
	<div class="book-card" th:each="book : ${searchList}">
	<img class="book-image" th:src=	"@{'/team18/' + ${book.cover}}"alt="本の表紙">
	<div class="book-info">
	          <h2 th:text="${book.bookNm}"></h2>
	          <p th:text="'作者：' + ${book.author}"></p>
	          <p th:text="'発行日：' + ${book.publishDay}"></p>
	          <p th:text="'在庫：' + ${book.stock}"></p>		  		  
			  <input type="hidden"
			             name="bookId"
			             th:value="${book.bookId}">

						 <button type="submit"
						             th:disabled="${book.stock <= 0}"
						             th:text="${book.stock <= 0} ? '在庫なし' : '借りる'">
						         レンタル
						     </button>
				     </div>
	 </div>  
	</form>
</th:block> 
</body>
</html>
