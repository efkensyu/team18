<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>検索</title>
</head>
<body>

<h1>本検索</h1>

<form th:action="@{team18search}" th:method="post">
    <input type="text" name="keyword">
    <button type="submit">検索</button>
</form>
<br>
<th:block class="scrollbox" th>
	<div class="book-card" th:each="book : ${books}">
	<img class="book-image" th:src=	"@{'/team18/' + ${book.cover}}"alt="本の表紙">
	<div class="book-info">
	          <h2 th:text="${book.bookNm}"></h2>
	          <p th:text="'作者：' + ${book.author}"></p>
	          <p th:text="'発行日：' + ${book.publishDay}"></p>
	          <p th:text="'在庫：' + ${book.stock}"></p>
			  <a th:href="@{/team18rental(bookId=${book.bookId})}">
	                    レンタル
	            </a>
	     </div>
	 </div>
</th:block> 
</body>
</html>
