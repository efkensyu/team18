<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.ofg">
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<link rel="stylesheet" type="text/css" href="team18/Team18return.css">
</head>
<body>
	<form th:action="@{/team18return}" method="post">
	    <div th:if="${#lists.isEmpty(rentalList)}">
	        現在貸出中の本はございません
	    </div>
	    <div th:each="rental : ${rentalList}">
	    <label>
	    <input type="radio"name="logId"th:value="${rental.logId}">
	     本ID：
	    <span th:text="${rental.bookId}"></span>
	    貸出日：
	    <span th:text="${rental.rentStart}"></span>
	    </label>
	    </div>
	    <button type="submit"
	            name="return"
	            th:if="${!#lists.isEmpty(rentalList)}">
	        選択した本を返却
	    </button>
	</form>
</body>
</html>
